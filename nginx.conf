server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all unmatched paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-bust hashed static assets for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html itself
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
